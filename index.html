    <!-- Preconnect para reducir latencia DNS/TLS en dominios críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://firebaseapp.com" />

    <!-- FIX modern-web-guidance: Preload de fuente crítica (Orbitron) usada en
         el H1 candidato a LCP. fetchpriority="high" la pone al nivel de la imagen
         LCP para que el texto se pinte en el primer frame disponible. -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/orbitron/v31/yMJMMIlzdpvBhQQL_SC3X9yhF25-T1nyGy6BoWgz.woff2"
      as="font"
      type="font/woff2"
      crossorigin
      fetchpriority="high"
    />

    <!-- Google Fonts: display=swap evita FOIT + carga fuera de ruta crítica -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;800;900&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
